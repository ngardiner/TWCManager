name: "Integration Test Suite"

on:
  push:
    branches:
      - main
      - ci_dev
  pull_request:
    branches:
      - main
      - ci_dev

jobs:
  build-test-image:
    name: Build Test Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build test image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: tests/docker/Dockerfile
          push: false
          load: true
          tags: twcmanager-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-tests:
     name: Integration Tests - Python ${{ matrix.python-version }}
     runs-on: ubuntu-latest
     needs: build-test-image
     strategy:
       fail-fast: false
       matrix:
         python-version: ['3.8', '3.9', '3.10', '3.11']
     
     services:
        mariadb:
          image: mariadb:latest
          env:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: twcmanager
            MYSQL_USER: twcmanager
            MYSQL_PASSWORD: twcmanager
          options: >-
            --health-cmd="mysqladmin ping -u root -proot"
            --health-interval=5s
            --health-timeout=10s
            --health-retries=10
            --health-start-period=30s
          ports:
            - 3306:3306
     
     steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Set up Python ${{ matrix.python-version }}
          uses: actions/setup-python@v4
          with:
            python-version: ${{ matrix.python-version }}
            cache: 'pip'

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install -r requirements-test.txt

        - name: Pre-flight check - Verify MariaDB is ready
          run: |
            echo "Waiting for MariaDB to be ready..."
            for i in {1..60}; do
              if mysql -h 127.0.0.1 -u twcmanager -ptwcmanager -e "SELECT 1" 2>/dev/null; then
                echo "✓ MariaDB is ready after $i attempts"
                mysql -h 127.0.0.1 -u twcmanager -ptwcmanager -e "SHOW DATABASES;"
                exit 0
              fi
              echo "  Attempt $i/60: MariaDB not ready yet..."
              sleep 1
            done
            echo "✗ MariaDB failed to start after 60 seconds"
            exit 1

        - name: Start TWCManager with verbose logging
          run: |
            mkdir -p /tmp/twcmanager/log
            mkdir -p /tmp/twcmanager/csv
            cp etc/twcmanager/.testconfig.json config.json
            
            echo "=== Starting TWCManager at $(date) ==="
            echo "Config file:"
            head -20 config.json
            echo ""
            echo "=== TWCManager startup output ==="
            
            # Start TWCManager and capture both stdout and stderr with timestamps
            python -c "import sys; sys.path.insert(0, 'lib'); from TWCManager.TWCManager import *" 2>&1 | while IFS= read -r line; do
              echo "[$(date '+%H:%M:%S.%3N')] $line"
            done > /tmp/twcmanager/twcmanager.log 2>&1 &
            
            TWCM_PID=$!
            echo "TWCManager PID: $TWCM_PID"
            
            # Give it time to start
            sleep 3
            
            # Check if process is still running
            if kill -0 $TWCM_PID 2>/dev/null; then
              echo "✓ TWCManager process is running"
            else
              echo "✗ TWCManager process exited"
              echo "Exit code: $?"
              echo "Log contents:"
              cat /tmp/twcmanager/twcmanager.log
              exit 1
            fi
          env:
            PYTHONIOENCODING: UTF-8

        - name: Health check - Wait for TWCManager API
          run: |
            echo "=== Waiting for TWCManager API to be ready ==="
            for i in {1..120}; do
              if curl -s http://127.0.0.1:8088/api/getStatus > /dev/null 2>&1; then
                echo "✓ TWCManager API is ready after $i seconds"
                curl -s http://127.0.0.1:8088/api/getStatus | head -20
                exit 0
              fi
              
              if [ $((i % 10)) -eq 0 ]; then
                echo "  Attempt $i/120: API not ready yet..."
                echo "  Current processes:"
                ps aux | grep -i twcmanager | grep -v grep || echo "    No TWCManager process found"
                echo "  Port 8088 status:"
                netstat -tlnp 2>/dev/null | grep 8088 || echo "    Port 8088 not listening"
              fi
              
              sleep 1
            done
            
            echo "✗ TWCManager API failed to start after 120 seconds"
            echo ""
            echo "=== Final diagnostics ==="
            echo "Processes:"
            ps aux | grep -i twcmanager | grep -v grep || echo "No TWCManager process"
            echo ""
            echo "Port status:"
            netstat -tlnp 2>/dev/null | grep -E '8088|3306' || echo "Ports not listening"
            echo ""
            echo "TWCManager log (last 100 lines):"
            tail -100 /tmp/twcmanager/twcmanager.log
            exit 1

        - name: Run integration tests
          run: |
            pytest tests/integration/ \
              -v \
              --tb=short \
              --junit-xml=test-results/junit-integration.xml \
              --cov=lib/TWCManager \
              --cov-report=xml:test-results/coverage.xml \
              --cov-report=term-missing

        - name: Capture full diagnostics on failure
          if: failure()
          run: |
            echo "=== FAILURE DIAGNOSTICS at $(date) ==="
            echo ""
            echo "=== TWCManager Full Log ==="
            cat /tmp/twcmanager/twcmanager.log
            echo ""
            echo "=== Process Status ==="
            ps aux | grep -E 'twcmanager|python|mariadb' | grep -v grep
            echo ""
            echo "=== Network Status ==="
            netstat -tlnp 2>/dev/null | grep -E '8088|3306'
            echo ""
            echo "=== MariaDB Connection Test ==="
            mysql -h 127.0.0.1 -u twcmanager -ptwcmanager -e "SELECT VERSION(); SHOW DATABASES;" 2>&1 || echo "Connection failed"
            echo ""
            echo "=== Directory Contents ==="
            ls -lah /tmp/twcmanager/
            echo ""
            echo "=== Config File ==="
            cat config.json | head -50
            echo ""
            echo "=== Python Version ==="
            python --version
            echo ""
            echo "=== Installed Packages ==="
            pip list | grep -E 'mysql|mariadb|paho|pytest'

        - name: Upload test results
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: test-results-${{ matrix.python-version }}
            path: test-results/

        - name: Upload coverage to Codecov
          if: always()
          uses: codecov/codecov-action@v3
          with:
            files: ./test-results/coverage.xml
            flags: integration
            name: integration-py${{ matrix.python-version }}

  unit-tests:
    name: Unit Tests - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            --junit-xml=test-results/junit-unit.xml \
            --cov=lib/TWCManager \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=term-missing \
            2>/dev/null || echo "No unit tests found yet"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-unit-${{ matrix.python-version }}
          path: test-results/

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [integration-tests, unit-tests]
    if: always()
    
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/junit-*.xml'
          check_name: Test Results
          comment_mode: always

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: contrib/docker
          push: true
          tags: |
            twcmanager/twcmanager:latest
            twcmanager/twcmanager:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
